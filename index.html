<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login - Currículo Walter Baraúna. Acesse o portfólio profissional de Walter Gonçalves Baraúna Filho, desenvolvedor com experiência em Python, Django, PostgreSQL e AWS.">
    <meta name="keywords" content="Walter Baraúna, desenvolvedor, Python, Django, PostgreSQL, AWS, currículo, portfólio">
    <meta name="author" content="Walter Gonçalves Baraúna Filho">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://walterbaraunaf.github.io/Tecnologia-Web/">
    <meta property="og:title" content="Login - Currículo Walter Baraúna">
    <meta property="og:description" content="Portfólio profissional de Walter Gonçalves Baraúna Filho, desenvolvedor especializado em Python e Django.">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta property="twitter:title" content="Login - Currículo Walter Baraúna">
    <meta property="twitter:description" content="Portfólio profissional de Walter Gonçalves Baraúna Filho, desenvolvedor especializado em Python e Django.">
    
    <title>Login - Currículo Walter Baraúna</title>
    
    <!-- Preconnect para CDNs -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- SweetAlert2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/imagens/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="assets/imagens/favicon.ico">
    <link rel="apple-touch-icon" href="assets/imagens/favicon.ico">
</head>
<body>
    <div class="container-fluid vh-100 p-0">
        <div class="row g-0 h-100">
            <!-- Lado Esquerdo - Logo e Branding -->
            <div class="col-lg-6 d-none d-lg-flex login-left-panel">
                <div class="d-flex flex-column align-items-center justify-content-center w-100 p-5">
                    <img src="assets/imagens/icon-cv.png" alt="Logo CV" class="login-logo mb-4">
                    <h1 class="login-brand-title mb-2">CURRÍCULO</h1>
                    <p class="login-brand-subtitle">Portfólio Profissional</p>
                </div>
            </div>
            
            <!-- Lado Direito - Formulário de Login -->
            <div class="col-lg-6 login-right-panel">
                <div class="d-flex align-items-center justify-content-center h-100 p-4">
                    <div class="login-form-container">
                        <!-- Logo mobile -->
                        <div class="text-center mb-4 d-lg-none">
                            <img src="assets/imagens/icon-cv.png" alt="Logo CV" class="login-logo-mobile mb-3">
                            <h1 class="login-brand-title-mobile mb-2">CURRÍCULO</h1>
                        </div>
                        
                        <div class="text-center mb-5">
                            <h2 class="login-title">Bem-vindo</h2>
                            <p class="login-subtitle">Acesse sua conta para continuar</p>
                        </div>
                        
                        <form id="loginForm" novalidate>
                            <div class="mb-4">
                                <label for="email" class="form-label-custom">E-MAIL</label>
                                <div class="input-icon-wrapper">
                                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                                        <path d="m2 7 10 7 10-7"/>
                                    </svg>
                                    <input type="email" class="form-control-custom" id="email" name="email" 
                                           placeholder="seu@email.com" required>
                                </div>
                                <div class="invalid-feedback">
                                    Por favor, insira um e-mail válido.
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="senha" class="form-label-custom">SENHA</label>
                                <div class="input-icon-wrapper">
                                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                    </svg>
                                    <input type="password" class="form-control-custom" id="senha" name="senha" 
                                           placeholder="••••••••" required>
                                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar senha">
                                        <svg class="eye-icon" id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                            <circle cx="12" cy="12" r="3"/>
                                        </svg>
                                        <svg class="eye-off-icon" id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                            <line x1="1" y1="1" x2="23" y2="23"/>
                                        </svg>
                                    </button>
                                </div>
                                <div class="senha-requisitos mt-2" id="senhaRequisitos" style="display: none;">
                                    <small class="d-block text-muted mb-1">A senha deve conter:</small>
                                    <small class="d-block requisito" id="req-tamanho">
                                        <span class="requisito-icon">✗</span> Mínimo 8 caracteres
                                    </small>
                                    <small class="d-block requisito" id="req-maiuscula">
                                        <span class="requisito-icon">✗</span> Pelo menos uma letra maiúscula
                                    </small>
                                    <small class="d-block requisito" id="req-numero">
                                        <span class="requisito-icon">✗</span> Pelo menos um número
                                    </small>
                                    <small class="d-block requisito" id="req-especial">
                                        <span class="requisito-icon">✗</span> Pelo menos um caractere especial
                                    </small>
                                </div>
                                <div class="invalid-feedback">
                                    Por favor, insira uma senha.
                                </div>
                            </div>
                            
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn-login">
                                    Entrar
                                </button>
                            </div>
                        </form>
                        
                        <div id="login-error" class="mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- JavaScript Personalizado -->
    <script src="js/script.js"></script>
</body>
</html>
