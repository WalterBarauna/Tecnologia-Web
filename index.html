<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login - Currículo Walter Baraúna. Acesse o portfólio profissional de Walter Gonçalves Baraúna Filho, desenvolvedor com experiência em Python, Django, PostgreSQL e AWS.">
    <meta name="keywords" content="Walter Baraúna, desenvolvedor, Python, Django, PostgreSQL, AWS, currículo, portfólio">
    <meta name="author" content="Walter Gonçalves Baraúna Filho">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://walterbaraunaf.github.io/Tecnologia-Web/">
    <meta property="og:title" content="Login - Currículo Walter Baraúna">
    <meta property="og:description" content="Portfólio profissional de Walter Gonçalves Baraúna Filho, desenvolvedor especializado em Python e Django.">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta property="twitter:title" content="Login - Currículo Walter Baraúna">
    <meta property="twitter:description" content="Portfólio profissional de Walter Gonçalves Baraúna Filho, desenvolvedor especializado em Python e Django.">
    
    <title>Login - Currículo Walter Baraúna</title>
    
    <!-- Preconnect para CDNs -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/imagens/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="assets/imagens/favicon.ico">
    <link rel="apple-touch-icon" href="assets/imagens/favicon.ico">
</head>
<body class="bg-light">
    <div class="container-fluid vh-100 d-flex align-items-center justify-content-center login-container">
        <div class="row w-100">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4 mx-auto">
                <div class="card shadow-sm login-card">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h2 class="card-title">Acesso ao Currículo</h2>
                            <p class="text-muted">Walter Gonçalves Baraúna Filho</p>
                        </div>
                        
                        <form id="loginForm" novalidate>
                            <div class="mb-3">
                                <label for="usuario" class="form-label">Usuário</label>
                                <input type="text" class="form-control" id="usuario" name="usuario" 
                                       placeholder="Digite seu usuário" required>
                                <div class="invalid-feedback">
                                    Por favor, insira um usuário válido.
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha" name="senha" 
                                       placeholder="Digite sua senha" required>
                                <div class="invalid-feedback">
                                    Por favor, insira uma senha.
                                </div>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Entrar
                                </button>
                            </div>
                        </form>
                        
                        <div id="login-error" class="mt-3" style="display: none;"></div>
                        
                        <div class="text-center mt-4">
                            <small class="text-muted">
                                Sistema de demonstração acadêmica
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JavaScript Personalizado -->
    <script src="js/script.js"></script>
</body>
</html>
